# ============================================================================
# Green Compute System - Data Import Configuration
# Auto-generated from data/metadata/data_dictionary.xlsx
# Maps Excel files in data/raw/ to PostgreSQL tables in green_compute
# ============================================================================

imports:

  # =========================================================================
  # 1. Clean Data (raw indicator values)
  # =========================================================================
  - table_name: indicator_values
    file_path: data/raw/clean_data.xlsx
    sheet_name: clean_data
    description: 清洗后的原始指标值（31省×9年×34指标）
    column_mapping:
      province: 省份
      year: 年份
      x01_gdp: GDP（亿元）
      x02_population: 常住人口（万人)
      x03_energy_consumption: 能源消费总量
      x04_co2_emission: CO2排放量（吨）
      x05_fiber_cable_per_10k: 每万人光缆线路长度
      x06_5g_base_stations_per_10k: 每万人5G基站数
      x07_access_ports_per_10k: 每万人接入端口数
      x08_energy_consumption_per_gdp: 单位GDP能耗
      x09_renewable_power_share: 可再生能源发电占比（可再生能源电力消纳比重）
      x10_carbon_intensity: 碳排放强度（吨/万元）
      x11_it_service_value_added_share: 信息传输、软件和信息技术服务业增加值占GDP比重
      x12_telecom_business_intensity: 电信业务发展强度
      x13_labor_productivity: 全员劳动生产率
      x14_rd_expenditure_intensity: R&D经费投入强度
      x15_invention_patents_per_10k: 万人发明专利占比
      x16_high_tech_investment_intensity: 高技术产业投资强度
      x17_power_capacity_per_10k: 每万人发电装机容量
      x18_mobile_phone_penetration: 移动电话普及率（部/百人）
      x19_mobile_internet_penetration: 移动互联网用户普及水平
      x20_broadband_users_per_10k: 每万人互联网宽带接入用户数
      x21_avg_temperature: 年平均气温
      x22_it_employee_share: 信息技术从业人员占比（比值）
      x23_water_resources_per_capita: 人均水资源量（立方米/人）
      x24_science_tech_expenditure_share: 科学技术支出占比（比值）
      x25_electricity_consumption: 全社会用电量（亿千瓦时）
      x26_electricity_per_capita: 人均全社会用电量（千瓦时/人）
      x27_industrial_solid_waste_utilization: 一般工业固体废物综合利用率（比值）
      x28_energy_saving_env_spending_intensity: 节能环保支出强度（比值）
      x29_tertiary_industry_value_added: 第三产业增加值（亿元）
      x30_rd_personnel_fte: R&D人员全时当量（人年）
      x31_green_patent_applications: 绿色专利申请量（件）
      x32_gov_science_tech_spending: 政府科技支出（亿元）
      x33_digital_financial_inclusion_index: 数字普惠金融指数（指数）
      x34_national_compute_hub_code: 国家算力枢纽节点编码（编码）
    required_fields: [province, year]
    unique_keys: [province, year]
    numeric_fields:
      - x01_gdp
      - x02_population
      - x03_energy_consumption
      - x04_co2_emission
      - x05_fiber_cable_per_10k
      - x06_5g_base_stations_per_10k
      - x07_access_ports_per_10k
      - x08_energy_consumption_per_gdp
      - x09_renewable_power_share
      - x10_carbon_intensity
      - x11_it_service_value_added_share
      - x12_telecom_business_intensity
      - x13_labor_productivity
      - x14_rd_expenditure_intensity
      - x15_invention_patents_per_10k
      - x16_high_tech_investment_intensity
      - x17_power_capacity_per_10k
      - x18_mobile_phone_penetration
      - x19_mobile_internet_penetration
      - x20_broadband_users_per_10k
      - x21_avg_temperature
      - x22_it_employee_share
      - x23_water_resources_per_capita
      - x24_science_tech_expenditure_share
      - x25_electricity_consumption
      - x26_electricity_per_capita
      - x27_industrial_solid_waste_utilization
      - x28_energy_saving_env_spending_intensity
      - x29_tertiary_industry_value_added
      - x30_rd_personnel_fte
      - x31_green_patent_applications
      - x32_gov_science_tech_spending
      - x33_digital_financial_inclusion_index
    integer_fields:
      - year
      - x34_national_compute_hub_code

  # =========================================================================
  # 2. Indicator System Definition (from 表2-1 + data_dictionary)
  # =========================================================================
  - table_name: indicator_system
    file_path: data/raw/表2-1_指标体系.xlsx
    sheet_name: Sheet1
    description: 指标体系定义（34个指标、8个维度、指标方向）
    column_mapping:
      dimension: 一级维度
      indicator_name: 指标名称
      direction: 指标方向
    # Enrich from data dictionary: match on indicator_name, pull codes + metadata
    dictionary:
      path: data/metadata/data_dictionary.xlsx
      sheet: Sheet3_indicators
      match_field: indicator_name             # key to join on (must exist in both)
      fields:                                 # columns to pull from dictionary
        indicator_code: indicator_code
        field_name: field_name
        unit: unit
        meaning: meaning
      # direction and dimension already exist in the Excel;
      # dictionary values act as fallback / override if Excel row is missing them
    required_fields: [indicator_code, field_name, indicator_name, dimension]
    unique_keys: [indicator_code]
    string_fields: [dimension, indicator_name, direction, indicator_code, field_name, unit]

  # =========================================================================
  # 3. Indicator Values Normalized (from 表3-1)
  # =========================================================================
  - table_name: indicator_values_normalized
    file_path: data/raw/表3-1_标准化数据.xlsx
    sheet_name: Sheet1
    description: 标准化后的指标值（31省×9年×34指标）
    column_mapping:
      province: 省份
      year: 年份
      x01_gdp: GDP（亿元）
      x02_population: 常住人口（万人)
      x03_energy_consumption: 能源消费总量
      x04_co2_emission: CO2排放量（吨）
      x05_fiber_cable_per_10k: 每万人光缆线路长度
      x06_5g_base_stations_per_10k: 每万人5G基站数
      x07_access_ports_per_10k: 每万人接入端口数
      x08_energy_consumption_per_gdp: 单位GDP能耗
      x09_renewable_power_share: 可再生能源发电占比（可再生能源电力消纳比重）
      x10_carbon_intensity: 碳排放强度（吨/万元）
      x11_it_service_value_added_share: 信息传输、软件和信息技术服务业增加值占GDP比重
      x12_telecom_business_intensity: 电信业务发展强度
      x13_labor_productivity: 全员劳动生产率
      x14_rd_expenditure_intensity: R&D经费投入强度
      x15_invention_patents_per_10k: 万人发明专利占比
      x16_high_tech_investment_intensity: 高技术产业投资强度
      x17_power_capacity_per_10k: 每万人发电装机容量
      x18_mobile_phone_penetration: 移动电话普及率（部/百人）
      x19_mobile_internet_penetration: 移动互联网用户普及水平
      x20_broadband_users_per_10k: 每万人互联网宽带接入用户数
      x21_avg_temperature: 年平均气温
      x22_it_employee_share: 信息技术从业人员占比（比值）
      x23_water_resources_per_capita: 人均水资源量（立方米/人）
      x24_science_tech_expenditure_share: 科学技术支出占比（比值）
      x25_electricity_consumption: 全社会用电量（亿千瓦时）
      x26_electricity_per_capita: 人均全社会用电量（千瓦时/人）
      x27_industrial_solid_waste_utilization: 一般工业固体废物综合利用率（比值）
      x28_energy_saving_env_spending_intensity: 节能环保支出强度（比值）
      x29_tertiary_industry_value_added: 第三产业增加值（亿元）
      x30_rd_personnel_fte: R&D人员全时当量（人年）
      x31_green_patent_applications: 绿色专利申请量（件）
      x32_gov_science_tech_spending: 政府科技支出（亿元）
      x33_digital_financial_inclusion_index: 数字普惠金融指数（指数）
      x34_national_compute_hub_code: 国家算力枢纽节点编码（编码）
    required_fields: [province, year]
    unique_keys: [province, year]
    numeric_fields:
      - x01_gdp
      - x02_population
      - x03_energy_consumption
      - x04_co2_emission
      - x05_fiber_cable_per_10k
      - x06_5g_base_stations_per_10k
      - x07_access_ports_per_10k
      - x08_energy_consumption_per_gdp
      - x09_renewable_power_share
      - x10_carbon_intensity
      - x11_it_service_value_added_share
      - x12_telecom_business_intensity
      - x13_labor_productivity
      - x14_rd_expenditure_intensity
      - x15_invention_patents_per_10k
      - x16_high_tech_investment_intensity
      - x17_power_capacity_per_10k
      - x18_mobile_phone_penetration
      - x19_mobile_internet_penetration
      - x20_broadband_users_per_10k
      - x21_avg_temperature
      - x22_it_employee_share
      - x23_water_resources_per_capita
      - x24_science_tech_expenditure_share
      - x25_electricity_consumption
      - x26_electricity_per_capita
      - x27_industrial_solid_waste_utilization
      - x28_energy_saving_env_spending_intensity
      - x29_tertiary_industry_value_added
      - x30_rd_personnel_fte
      - x31_green_patent_applications
      - x32_gov_science_tech_spending
      - x33_digital_financial_inclusion_index
    integer_fields: [year, x34_national_compute_hub_code]

  # =========================================================================
  # 4. Indicator Weights (from 表3-2)
  # =========================================================================
  - table_name: indicator_weights
    file_path: data/raw/表3-2_组合权重结果.xlsx
    sheet_name: Sheet1
    description: 组合权重结果（熵权法+CRITIC+组合权重）
    column_mapping:
      rank: 排名
      indicator_name: 指标名称
      dimension: 一级维度
      indicator_direction: 指标方向
      entropy_weight: 熵权法权重
      critic_weight: CRITIC权重
      combined_weight: 组合权重
    required_fields: [indicator_name]
    unique_keys: [indicator_name]
    numeric_fields: [entropy_weight, critic_weight, combined_weight]
    integer_fields: [rank]

  # =========================================================================
  # 5. TOPSIS Scores (from 表3-3)
  # =========================================================================
  - table_name: topsis_scores
    file_path: data/raw/表3-3_绿色算力综合得分(1).xlsx
    sheet_name: Sheet1
    description: TOPSIS综合得分与排名（31省×9年）
    column_mapping:
      province: 省份
      year: 年份
      composite_score: 综合得分
      rank: 排名
    required_fields: [province, year]
    unique_keys: [province, year]
    numeric_fields: [composite_score]
    integer_fields: [year, rank]

  # =========================================================================
  # 6. LPA Results (第4章)
  # =========================================================================
  - table_name: lpa_model_fit
    file_path: data/raw/第4章_LPA结果表(1).xlsx
    sheet_name: 表4-1模型拟合
    description: LPA模型拟合统计量
    column_mapping:
      class_count: 类别数
      aic: AIC
      bic: BIC
      entropy: Entropy
      min_class_sample_size: 最小类别样本量
      class_size: 类别规模
    required_fields: [class_count]
    numeric_fields: [aic, bic, entropy]
    integer_fields: [class_count, min_class_sample_size]

  - table_name: lpa_type_summary
    file_path: data/raw/第4章_LPA结果表(1).xlsx
    sheet_name: 表4-2类型汇总
    description: LPA类型汇总
    column_mapping:
      lpa_type: 类型
      type_name: 类型命名
      province_count: 省份数量
      mean_2016: 2016年均值
      mean_2024: 2024年均值
      stage_increment: 阶段增量
      mean_2016_2024: 2016—2024均值
      province: 省份
    required_fields: [lpa_type, type_name]
    numeric_fields: [mean_2016, mean_2024, stage_increment, mean_2016_2024]
    integer_fields: [province_count]

  - table_name: lpa_province_assignment
    file_path: data/raw/第4章_LPA结果表(1).xlsx
    sheet_name: 表4-3省份归属
    description: LPA省份归属
    column_mapping:
      province: 省份
      lpa_type: LPA类型
      type_name: 类型命名
      score_2016: 2016年得分
      score_2024: 2024年得分
      stage_increment: 阶段增量
      mean_2016_2024: 2016—2024均值
      max_posterior_probability: 最大后验概率
    required_fields: [province]
    unique_keys: [province]
    numeric_fields: [score_2016, score_2024, stage_increment, mean_2016_2024, max_posterior_probability]

  - table_name: lpa_type_trajectory
    file_path: data/raw/第4章_LPA结果表(1).xlsx
    sheet_name: 类型均值轨迹
    description: LPA类型均值轨迹（2016-2024）
    column_mapping:
      year: 年份
      type1_high_leading: 类型1 高位领先型
      type2_advantage_supporting: 类型2 优势支撑型
      type3_mid_catching_up: 类型3 中位追赶型
      type4_basic_cultivating: 类型4 基础培育型
    required_fields: [year]
    unique_keys: [year]
    numeric_fields: [type1_high_leading, type2_advantage_supporting, type3_mid_catching_up, type4_basic_cultivating]
    integer_fields: [year]

  # =========================================================================
  # 7. Spatial Evolution (第5章) - Multiple sheets
  # =========================================================================
  - table_name: kde_statistics
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: KDE统计量
    description: KDE核密度估计统计量
    column_mapping:
      year: 年份
      mean_value: 均值
      standard_deviation: 标准差
      skewness: 偏度
      kurtosis: 峰度
      min_value: 最小值
      max_value: 最大值
      peak_position: 峰值位置
      peak_height: 峰值高度
    required_fields: [year]
    unique_keys: [year]
    numeric_fields: [mean_value, standard_deviation, skewness, kurtosis, min_value, max_value, peak_position, peak_height]
    integer_fields: [year]

  - table_name: dagum_decomposition
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: Dagum分解
    description: Dagum基尼系数分解
    column_mapping:
      year: 年份
      total_gini: 总体基尼系数
      intra_region_difference: 区域内差异
      inter_region_net_difference: 区域间净差异
      hypervariable_density: 超变密度
      decomposition_sum: 分解项合计
      intra_region_contribution_rate: 区域内贡献率
      inter_region_contribution_rate: 区域间贡献率
      hypervariable_density_contribution_rate: 超变密度贡献率
    required_fields: [year]
    unique_keys: [year]
    numeric_fields: [total_gini, intra_region_difference, inter_region_net_difference, hypervariable_density, decomposition_sum, intra_region_contribution_rate, inter_region_contribution_rate, hypervariable_density_contribution_rate]
    integer_fields: [year]

  - table_name: dagum_intra_region
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: Dagum区域内明细
    description: Dagum区域内基尼系数明细
    column_mapping:
      year: 年份
      region: 区域
      sample_size: 样本量
      mean_value: 均值
      intra_region_gini: 区域内基尼
      p_j: p_j
      s_j: s_j
    required_fields: [year, region]
    unique_keys: [year, region]
    numeric_fields: [mean_value, intra_region_gini, p_j, s_j]
    integer_fields: [year, sample_size]

  - table_name: dagum_inter_region
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: Dagum区域间明细
    description: Dagum区域间基尼系数明细
    column_mapping:
      year: 年份
      region_pair: 区域组合
      high_mean_region: 高均值区域
      low_mean_region: 低均值区域
      inter_region_gini: 区域间基尼
      relative_influence_d: 相对影响D
      net_difference_contribution: 净差异贡献
      hypervariable_density_contribution: 超变密度贡献
    required_fields: [year, region_pair]
    unique_keys: [year, region_pair]
    numeric_fields: [inter_region_gini, relative_influence_d, net_difference_contribution, hypervariable_density_contribution]
    integer_fields: [year]

  - table_name: moran_results
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: 全局Moran指数
    description: 全局Moran's I空间自相关
    column_mapping:
      year: 年份
      moran_i: Moran_I
      two_sided_p_value: 双侧p值
      positive_p_value: 正向p值
      permutation_mean: 置换均值
      permutation_std: 置换标准差
    required_fields: [year]
    unique_keys: [year]
    numeric_fields: [moran_i, two_sided_p_value, positive_p_value, permutation_mean, permutation_std]
    integer_fields: [year]

  - table_name: lisa_results
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: LISA_2024
    description: LISA局部空间自相关（2024年）
    column_mapping:
      province: 省份
      year: 年份
      composite_score: 综合得分
      standardized_score_z: 标准化得分Z
      spatial_lag_wz: 空间滞后WZ
      local_moran_i: Local_Moran_I
      p_value: p值
      lisa_type: LISA类型
    required_fields: [province]
    unique_keys: [province, year]
    numeric_fields: [composite_score, standardized_score_z, spatial_lag_wz, local_moran_i, p_value]
    integer_fields: [year]

  - table_name: markov_frequency
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: 传统Markov频数
    description: 传统马尔可夫转移频数矩阵
    column_mapping:
      from_state: "Unnamed: 0"      # First column has no header, contains state names
      to_low_level_count: 低水平
      to_mid_low_level_count: 中低水平
      to_mid_high_level_count: 中高水平
      to_high_level_count: 高水平
    required_fields: [from_state]
    unique_keys: [from_state]
    integer_fields: [to_low_level_count, to_mid_low_level_count, to_mid_high_level_count, to_high_level_count]
    # NOTE: The first column is unnamed in the Excel; import script renames it to 'from_state'

  - table_name: markov_probability
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: 传统Markov概率
    description: 传统马尔可夫转移概率矩阵
    column_mapping:
      from_state: "Unnamed: 0"
      to_low_level_probability: 低水平
      to_mid_low_level_probability: 中低水平
      to_mid_high_level_probability: 中高水平
      to_high_level_probability: 高水平
    required_fields: [from_state]
    unique_keys: [from_state]
    numeric_fields: [to_low_level_probability, to_mid_low_level_probability, to_mid_high_level_probability, to_high_level_probability]
    # NOTE: The first column is unnamed in the Excel; import script renames it to 'from_state'

  - table_name: spatial_markov
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: 空间Markov长表
    description: 空间马尔可夫转移矩阵（长表格式）
    column_mapping:
      neighborhood_state: 邻域状态
      from_state: 转移前状态
      to_state: 转移后状态
      frequency: 频数
      probability: 概率
    required_fields: [neighborhood_state, from_state, to_state]
    unique_keys: [neighborhood_state, from_state, to_state]
    numeric_fields: [probability]
    integer_fields: [frequency]

  - table_name: spatial_lag_state
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: 空间滞后状态
    description: 空间滞后状态（面板数据）
    column_mapping:
      province: 省份
      year: 年份
      spatial_lag_score: 空间滞后得分
      neighborhood_state_code: 邻域状态编号
      neighborhood_state_name: 邻域状态名称
      current_state: 本期状态
      next_state: 下期状态
    required_fields: [province, year]
    unique_keys: [province, year]
    numeric_fields: [spatial_lag_score]
    integer_fields: [year, neighborhood_state_code]

  - table_name: state_thresholds
    file_path: data/raw/第5章_空间演化分析结果表(1).xlsx
    sheet_name: 状态划分阈值
    description: Markov状态划分阈值
    column_mapping:
      state: 状态
      classification_rule: 划分规则
      threshold_note: 阈值说明
    required_fields: [state]
    unique_keys: [state]

  - table_name: adjacency_matrix
