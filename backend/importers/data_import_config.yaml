  # Verified from clean_data.xlsx: provinces where x34_national_compute_hub_code > 0
  # 14 hub provinces as encoded in the data:
  - 上海
  - 内蒙古
  - 北京
  - 四川
  - 天津
  - 宁夏
  - 安徽
  - 广东
  - 江苏
  - 河北
  - 浙江
  - 甘肃
  - 贵州
  - 重庆
  # x34 field: 0=非枢纽, 1=枢纽节点
  # Non-hub provinces (x34=0): 云南, 吉林, 山东, 山西, 广西, 新疆, 江西, 河南, 海南, 湖北, 湖南, 福建, 西藏, 辽宁, 陕西, 青海, 黑龙江

# ============================================================================
# Year validation range
# ============================================================================
year_range:
  min: 2016
  max: 2024

# ============================================================================
# Import mode (append | replace)
# ============================================================================
import_mode: append
